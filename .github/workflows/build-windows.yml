name: Build Windows

on:
  workflow_dispatch:       # запуск вручную кнопкой на GitHub
  push:
    tags:
      - "v*"               # или автоматически при push тега v1.0.0

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    environment: APP_ENV

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: |
          choco install ffmpeg -y
          # Refresh PATH so ffmpeg is available in subsequent steps
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH", "User")
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV
        shell: powershell

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        shell: powershell

      # Создаём .env из GitHub Secrets (Settings → Secrets → Actions)
      - name: Create .env
        shell: powershell
        env:
          ENV_CONTENT: ${{ vars.APP_ENV }}
        run: |
          if ($env:ENV_CONTENT) {
            $utf8NoBom = New-Object System.Text.UTF8Encoding $false
            [System.IO.File]::WriteAllText((Resolve-Path ".").Path + "\.env", $env:ENV_CONTENT, $utf8NoBom)
            echo ".env created from variable (UTF-8 no BOM)"
          } else {
            echo "WARNING: APP_ENV variable not set, .env will be empty"
            New-Item -ItemType File -Path ".env" -Force | Out-Null
          }

      - name: Build backend
        run: python scripts/build_backend.py
        shell: powershell

      - name: Build launcher (app)
        run: python scripts/build_app.py
        shell: powershell

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Meet-Transcript-Windows
          path: "dist/Meet Transcript win.exe"
          retention-days: 30
